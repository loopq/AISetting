add_newline = false
command_timeout = 1000

format = """
$directory\
$git_branch\
$git_status\
$fill\
$nodejs\
$python\
$java\
$kotlin\
$dart\
$golang\
$rust\
$cmd_duration\
$line_break\
$character
"""

[fill]
symbol = " "

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"
read_only = " у∞МЊ"

[git_branch]
symbol = "оВ† "
style = "bold purple"
format = " [$symbol$branch]($style)"

[git_status]
style = "bold red"
format = "([$all_status$ahead_behind]($style))"

[nodejs]
symbol = "вђҐ "
style = "bold green"
format = " [$symbol$version]($style)"

[python]
symbol = "рЯРН "
style = "bold yellow"
format = " [$symbol$version]($style)"

[java]
symbol = "вШХ "
style = "bold red"
format = " [$symbol$version]($style)"

[kotlin]
symbol = "рЯЕЇ "
style = "bold 208"
format = " [$symbol$version]($style)"

[dart]
symbol = "рЯОѓ "
style = "bold blue"
format = " [$symbol$version]($style)"

[golang]
symbol = "рЯРє "
style = "bold cyan"
format = " [$symbol$version]($style)"

[rust]
